services:
  # ----------------------------------------------------------------
  # Database Services
  # ----------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: quantumalpha-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-quantumalpha_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quantumalpha_pass}
      POSTGRES_DB: ${DB_NAME:-quantumalpha_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-quantumalpha_user} -d ${DB_NAME:-quantumalpha_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantumalpha-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quantumalpha-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantumalpha-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Backend API Service (Unified)
  # ----------------------------------------------------------------
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantumalpha-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=8080
      - FLASK_DEBUG=false
      - DATABASE_URL=postgresql://${DB_USER:-quantumalpha_user}:${DB_PASSWORD:-quantumalpha_pass}@postgres:5432/${DB_NAME:-quantumalpha_db}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-quantumalpha-jwt-secret-key-change-in-production}
      - SECRET_KEY=${SECRET_KEY:-quantumalpha-secret-key-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app:ro
    networks:
      - quantumalpha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["python", "app.py"]

  # ----------------------------------------------------------------
  # Data Service
  # ----------------------------------------------------------------
  data-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantumalpha-data-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    environment:
      - PORT=8001
      - FLASK_DEBUG=false
      - DATABASE_URL=postgresql://${DB_USER:-quantumalpha_user}:${DB_PASSWORD:-quantumalpha_pass}@postgres:5432/${DB_NAME:-quantumalpha_db}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8001:8001"
    networks:
      - quantumalpha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["python", "data_service/app.py"]

  # ----------------------------------------------------------------
  # AI Engine Service
  # ----------------------------------------------------------------
  ai-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantumalpha-ai-engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=8002
      - FLASK_DEBUG=false
      - DATABASE_URL=postgresql://${DB_USER:-quantumalpha_user}:${DB_PASSWORD:-quantumalpha_pass}@postgres:5432/${DB_NAME:-quantumalpha_db}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8002:8002"
    volumes:
      - ai_engine_models:/app/ai_engine/models
    networks:
      - quantumalpha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["python", "ai_engine/app.py"]

  # ----------------------------------------------------------------
  # Risk Service
  # ----------------------------------------------------------------
  risk-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantumalpha-risk-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=8003
      - FLASK_DEBUG=false
      - DATABASE_URL=postgresql://${DB_USER:-quantumalpha_user}:${DB_PASSWORD:-quantumalpha_pass}@postgres:5432/${DB_NAME:-quantumalpha_db}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8003:8003"
    networks:
      - quantumalpha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["python", "risk_service/app.py"]

  # ----------------------------------------------------------------
  # Execution Service
  # ----------------------------------------------------------------
  execution-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantumalpha-execution-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=8004
      - FLASK_DEBUG=false
      - DATABASE_URL=postgresql://${DB_USER:-quantumalpha_user}:${DB_PASSWORD:-quantumalpha_pass}@postgres:5432/${DB_NAME:-quantumalpha_db}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8004:8004"
    networks:
      - quantumalpha-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["python", "execution_service/app.py"]

  # ----------------------------------------------------------------
  # Web Frontend
  # ----------------------------------------------------------------
  web-frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
    container_name: quantumalpha-web-frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://api-gateway:8080/api
    ports:
      - "3000:80"
    networks:
      - quantumalpha-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------
  # Mobile Frontend (Expo Development Server)
  # ----------------------------------------------------------------
  # mobile-frontend:
  #   build:
  #     context: ./mobile-frontend
  #     dockerfile: Dockerfile
  #   container_name: quantumalpha-mobile-frontend
  #   depends_on:
  #     api-gateway:
  #       condition: service_healthy
  #   environment:
  #     - REACT_NATIVE_PACKAGER_HOSTNAME=${MOBILE_HOST:-localhost}
  #     - API_BASE_URL=http://api-gateway:8080/api
  #   ports:
  #     - "8081:8081"
  #     - "19000:19000"
  #     - "19001:19001"
  #     - "19002:19002"
  #   volumes:
  #     - ./mobile-frontend:/app
  #     - /app/node_modules
  #   networks:
  #     - quantumalpha-network
  #   restart: unless-stopped
  #   stdin_open: true
  #   tty: true

# ----------------------------------------------------------------
# Volumes and Networks
# ----------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  ai_engine_models:

networks:
  quantumalpha-network:
    driver: bridge
