name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    env:
      BACKEND_DIR: code/backend
      WEB_FRONTEND_DIR: web-frontend
      MOBILE_FRONTEND_DIR: mobile-frontend
      INFRASTRUCTURE_DIR: infrastructure
      SHARED_DIR: code/shared

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: code/shared/requirements.txt

      - name: Install Python formatters
        run: |
          python -m pip install --upgrade pip
          python -m pip install autoflake black==25.11.0

      - name: Check backend Python formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${BACKEND_DIR}" ]; then
            echo "Backend directory '${BACKEND_DIR}' not found — skipping."
            exit 0
          fi

          TMP_COPY="$(mktemp -d)"
          cp -a "${BACKEND_DIR}/." "$TMP_COPY/"

          autoflake \
            --remove-all-unused-imports \
            --remove-unused-variables \
            --recursive \
            --ignore-init-module-imports \
            --in-place \
            "$TMP_COPY"

          if ! diff -r "${BACKEND_DIR}" "$TMP_COPY" > /dev/null; then
            echo "autoflake found issues. Run autoflake locally."
            rm -rf "$TMP_COPY"
            exit 1
          fi
          rm -rf "$TMP_COPY"
          black "${BACKEND_DIR}" --check

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/package-lock.json

      - name: Install Node dependencies
        working-directory: tools
        run: npm ci

      - name: Check web frontend formatting
        shell: bash
        run: |
          if [ -d "${WEB_FRONTEND_DIR}" ]; then
            npx --prefix tools prettier --check "${WEB_FRONTEND_DIR}/**/*.{js,jsx,ts,tsx,json,html,css,md}" --ignore-path tools/.prettierrc
          fi

      - name: Check mobile frontend formatting
        shell: bash
        run: |
          if [ -d "${MOBILE_FRONTEND_DIR}" ]; then
            npx --prefix tools prettier --check "${MOBILE_FRONTEND_DIR}/**/*.{js,jsx,ts,tsx,json,html,css,md}" --ignore-path tools/.prettierrc
          fi

      - name: Check markdown and infra formatting
        shell: bash
        run: |
          npx --prefix tools prettier --check "**/*.md" --ignore-path tools/.prettierrc
          if [ -d "${INFRASTRUCTURE_DIR}" ]; then
            npx --prefix tools prettier --check "${INFRASTRUCTURE_DIR}/**/*.{yml,yaml}" --ignore-path tools/.prettierrc
          fi

  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality

    env:
      BACKEND_DIR: code/backend
      SHARED_DIR: code/shared
      PYTHONPATH: ${{ github.workspace }}/code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: code/shared/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f "${{ env.SHARED_DIR }}/requirements.txt" ]; then
            python -m pip install -r "${{ env.SHARED_DIR }}/requirements.txt"
          else
            echo "ERROR: requirements.txt not found"
            exit 1
          fi
          python -m pip install pytest pytest-cov pytest-asyncio

      - name: Run backend test suite
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          pytest tests/ \
            --tb=short \
            --strict-markers \
            -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-results
          path: |
            ${{ env.BACKEND_DIR }}/test-results.xml
            ${{ env.BACKEND_DIR }}/coverage.xml
