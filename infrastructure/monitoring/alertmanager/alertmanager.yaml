global:
  resolve_timeout: 5m
  smtp_from: "alerts@quantumalpha.com"
  smtp_smarthost: "smtp.quantumalpha.com:587"
  smtp_auth_username: "alerts@quantumalpha.com"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 10s
  group_interval: 10m
  repeat_interval: 12h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      repeat_interval: 1h
    - match:
        compliance: sox
      receiver: "compliance-alerts"
      repeat_interval: 30m
    - match:
        compliance: pci-dss
      receiver: "compliance-alerts"
      repeat_interval: 30m

receivers:
  - name: "default"
    email_configs:
      - to: "ops@quantumalpha.com"
        send_resolved: true

  - name: "critical-alerts"
    email_configs:
      - to: "oncall@quantumalpha.com"
        send_resolved: true
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts-critical"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: "compliance-alerts"
    email_configs:
      - to: "compliance@quantumalpha.com"
        send_resolved: true
