groups:
  - name: quantumalpha.infrastructure
    interval: 30s
    rules:
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="quantumalpha"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 5 minutes."

      - alert: PodNotReady
        expr: kube_pod_status_ready{namespace="quantumalpha", condition="true"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for 5 minutes."

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes{namespace="quantumalpha"} / container_spec_memory_limit_bytes{namespace="quantumalpha"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage for {{ $labels.container }}"
          description: "Container {{ $labels.container }} memory usage is above 90% of limit."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{namespace="quantumalpha"}[5m]) / container_spec_cpu_quota{namespace="quantumalpha"} * container_spec_cpu_period{namespace="quantumalpha"} > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage for {{ $labels.container }}"
          description: "Container {{ $labels.container }} CPU usage is above 90% of limit."

  - name: quantumalpha.database
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance is not reachable."

      - alert: PostgreSQLHighConnections
        expr: sum(pg_stat_activity_count) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections (limit 100)."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance is not reachable."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value | humanizePercentage }} of limit."

  - name: quantumalpha.compliance
    rules:
      - alert: AuditLogGap
        expr: time() - quantumalpha_last_audit_log_timestamp > 300
        for: 5m
        labels:
          severity: critical
          compliance: "true"
        annotations:
          summary: "Audit log gap detected (SOX compliance)"
          description: "No audit log entries for more than 5 minutes. SOX compliance may be violated."

      - alert: UnauthorizedAPIAccess
        expr: rate(quantumalpha_unauthorized_requests_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
          compliance: "true"
        annotations:
          summary: "High rate of unauthorized API access"
          description: "More than 10 unauthorized requests per second detected. Possible security breach."

      - alert: TradingHalted
        expr: quantumalpha_trading_enabled == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Trading has been halted"
          description: "The trading system has been halted. Immediate investigation required."

  - name: quantumalpha.kafka
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.group }} lag is {{ $value }} for topic {{ $labels.topic }}."

      - alert: KafkaBrokerDown
        expr: kafka_brokers < 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka broker is down"
          description: "No Kafka brokers are available."
