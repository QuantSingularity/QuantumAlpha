groups:
  - name: quantumalpha.infrastructure
    interval: 30s
    rules:
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="quantumalpha"}[5m]) * 60 > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted more than once per minute for 5 minutes."

      - alert: PostgreSQLDown
        expr: pg_up{namespace="quantumalpha"} == 0
        for: 1m
        labels:
          severity: critical
          compliance: sox
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is unreachable. This is a SOX compliance event."

      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count{datname="quantumalpha"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of PostgreSQL connections"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80)."

      - alert: RedisDown
        expr: redis_up{namespace="quantumalpha"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache service is unreachable."

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag{namespace="quantumalpha"} > 10000
        for: 10m
        labels:
          severity: warning
          compliance: sox
        annotations:
          summary: "High Kafka consumer lag"
          description: "Consumer group {{ $labels.group }} has lag {{ $value }} on topic {{ $labels.topic }}."

      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="quantumalpha"}[5m])) by (pod) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is using more than 90% CPU."

      - alert: HighMemoryUsage
        expr: sum(container_memory_usage_bytes{namespace="quantumalpha"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="quantumalpha"}) by (pod) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is using more than 85% of memory limit."

  - name: quantumalpha.compliance
    interval: 60s
    rules:
      - alert: AuditLogFailure
        expr: increase(quantumalpha_audit_log_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          compliance: sox
        annotations:
          summary: "Audit log write failure detected"
          description: "SOX compliance: audit log write failures detected. Immediate investigation required."

      - alert: UnauthorizedAccessAttempt
        expr: increase(quantumalpha_unauthorized_access_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
          compliance: pci-dss
        annotations:
          summary: "Multiple unauthorized access attempts"
          description: "PCI-DSS: {{ $value }} unauthorized access attempts in the last 5 minutes."

      - alert: EncryptionKeyExpiring
        expr: (quantumalpha_encryption_key_expiry_timestamp - time()) < 604800
        for: 1h
        labels:
          severity: warning
          compliance: pci-dss
        annotations:
          summary: "Encryption key expiring within 7 days"
          description: "PCI-DSS: Encryption key will expire in less than 7 days. Rotate immediately."
