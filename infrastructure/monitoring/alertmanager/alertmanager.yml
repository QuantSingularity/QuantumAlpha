global:
  resolve_timeout: 5m
  smtp_require_tls: true

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      group_wait: 10s
      repeat_interval: 1h
    - match:
        compliance: "true"
      receiver: "compliance-alerts"
      repeat_interval: 6h
    - match:
        alertname: TradingHalted
      receiver: "trading-alerts"
      group_wait: 0s
      repeat_interval: 5m

receivers:
  - name: "default"
    email_configs:
      - to: "ops@quantumalpha.com"
        from: "alerts@quantumalpha.com"
        smarthost: "smtp.quantumalpha.com:587"
        auth_username: "${SMTP_USERNAME}"
        auth_password: "${SMTP_PASSWORD}"
        send_resolved: true

  - name: "critical-alerts"
    email_configs:
      - to: "oncall@quantumalpha.com"
        from: "alerts@quantumalpha.com"
        smarthost: "smtp.quantumalpha.com:587"
        auth_username: "${SMTP_USERNAME}"
        auth_password: "${SMTP_PASSWORD}"
        send_resolved: true
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts-critical"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: "compliance-alerts"
    email_configs:
      - to: "compliance@quantumalpha.com"
        from: "alerts@quantumalpha.com"
        smarthost: "smtp.quantumalpha.com:587"
        auth_username: "${SMTP_USERNAME}"
        auth_password: "${SMTP_PASSWORD}"
        send_resolved: true

  - name: "trading-alerts"
    email_configs:
      - to: "trading@quantumalpha.com"
        from: "alerts@quantumalpha.com"
        smarthost: "smtp.quantumalpha.com:587"
        auth_username: "${SMTP_USERNAME}"
        auth_password: "${SMTP_PASSWORD}"
        send_resolved: true
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster", "service"]
