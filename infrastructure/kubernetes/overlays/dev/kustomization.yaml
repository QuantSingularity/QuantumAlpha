apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: quantumalpha-dev

patches:
  - path: configmap.yaml

replicas:
  - name: data-service
    count: 1
  - name: ai-engine
    count: 1
  - name: risk-service
    count: 1
  - name: execution-service
    count: 1
  - name: web-frontend
    count: 1

images:
  - name: ${ECR_REGISTRY}/quantumalpha/data-service
    newTag: dev-latest
  - name: ${ECR_REGISTRY}/quantumalpha/ai-engine
    newTag: dev-latest
  - name: ${ECR_REGISTRY}/quantumalpha/risk-service
    newTag: dev-latest
  - name: ${ECR_REGISTRY}/quantumalpha/execution-service
    newTag: dev-latest
  - name: ${ECR_REGISTRY}/quantumalpha/web-frontend
    newTag: dev-latest
